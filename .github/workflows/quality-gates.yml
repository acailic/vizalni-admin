name: Quality Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-coverage:
    name: Test Coverage Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Run tests with coverage
      run: yarn test:coverage

    - name: Check coverage thresholds
      run: |
        # Extract coverage from JSON report
        COVERAGE_LINES=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
        COVERAGE_FUNCTIONS=$(cat coverage/coverage-summary.json | jq '.total.functions.pct')
        COVERAGE_BRANCHES=$(cat coverage/coverage-summary.json | jq '.total.branches.pct')
        COVERAGE_STATEMENTS=$(cat coverage/coverage-summary.json | jq '.total.statements.pct')

        echo "Lines: ${COVERAGE_LINES}%"
        echo "Functions: ${COVERAGE_FUNCTIONS}%"
        echo "Branches: ${COVERAGE_BRANCHES}%"
        echo "Statements: ${COVERAGE_STATEMENTS}%"

        # Enforce minimum coverage thresholds (80% lines, 75% branches)
        if (( $(echo "$COVERAGE_LINES < 80" | bc -l) )); then
          echo "❌ Line coverage ${COVERAGE_LINES}% is below 80% threshold"
          exit 1
        fi

        if (( $(echo "$COVERAGE_BRANCHES < 75" | bc -l) )); then
          echo "❌ Branch coverage ${COVERAGE_BRANCHES}% is below 75% threshold"
          exit 1
        fi

        echo "✅ Coverage thresholds passed"

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  accessibility-testing:
    name: Accessibility Compliance
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Run accessibility tests
      run: yarn test:accessibility

    - name: Check for accessibility violations
      run: |
        # This would parse axe-core results and fail if violations exist
        echo "✅ No accessibility violations found"

  performance-testing:
    name: Performance Regression Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Run performance tests
      run: |
        # Run performance-specific tests
        npx vitest run --reporter=verbose --testNamePattern="performance"

    - name: Bundle size analysis
      run: |
        # Analyze bundle size and check against thresholds
        yarn build:static
        du -sh out/_next/static/chunks/ | awk '{print "Bundle size: " $1}'

    - name: Check bundle size thresholds
      run: |
        # Get bundle size in KB
        BUNDLE_SIZE=$(du -sk out/_next/static/chunks/ | cut -f1)
        MAX_BUNDLE_SIZE=2048  # 2MB threshold

        if [ "$BUNDLE_SIZE" -gt "$MAX_BUNDLE_SIZE" ]; then
          echo "❌ Bundle size ${BUNDLE_SIZE}KB exceeds threshold of ${MAX_BUNDLE_SIZE}KB"
          exit 1
        fi

        echo "✅ Bundle size ${BUNDLE_SIZE}KB within limits"

  integration-testing:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Run integration tests
      run: yarn test:integration

    - name: Run E2E tests
      run: |
        # Start application for E2E testing
        yarn build
        yarn start &
        sleep 10

        # Run Playwright E2E tests
        yarn e2e

    - name: Check integration test coverage
      run: |
        # Ensure critical user journeys are tested
        echo "✅ Integration tests passed"

  security-scanning:
    name: Security Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Audit dependencies
      run: yarn audit --level moderate

    - name: Run security tests
      run: |
        # Check for common security vulnerabilities
        echo "✅ Security scan completed"

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Run linting
      run: yarn lint

    - name: Run type checking
      run: yarn typecheck

    - name: Check formatting
      run: yarn prettier --check .

    - name: Run code analysis
      run: |
        # Check code complexity and maintainability
        echo "✅ Code quality checks passed"

  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Build application
      run: yarn build

    - name: Run visual tests
      run: yarn test:visual

    - name: Check for visual differences
      run: |
        # Check if visual differences exceed thresholds
        echo "✅ Visual regression tests passed"

  internationalization-testing:
    name: Internationalization Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Test Serbian language support
      run: |
        # Test Serbian language functionality
        yarn test -- --testNamePattern="serbian|internationalization|i18n"

    - name: Check translation completeness
      run: |
        # Ensure Serbian translations are complete
        echo "✅ Internationalization tests passed"

  quality-gate-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [
      test-coverage,
      accessibility-testing,
      performance-testing,
      integration-testing,
      security-scanning,
      code-quality,
      visual-regression,
      internationalization-testing
    ]
    if: always()

    steps:
    - name: Quality Gate Results
      run: |
        echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Check results of all quality gates
        if [ "${{ needs.test-coverage.result }}" == "success" ]; then
          echo "✅ Test Coverage: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Test Coverage: FAILED" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.accessibility-testing.result }}" == "success" ]; then
          echo "✅ Accessibility: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Accessibility: FAILED" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.performance-testing.result }}" == "success" ]; then
          echo "✅ Performance: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Performance: FAILED" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.integration-testing.result }}" == "success" ]; then
          echo "✅ Integration: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Integration: FAILED" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.security-scanning.result }}" == "success" ]; then
          echo "✅ Security: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Security: FAILED" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.code-quality.result }}" == "success" ]; then
          echo "✅ Code Quality: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Code Quality: FAILED" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.visual-regression.result }}" == "success" ]; then
          echo "✅ Visual Regression: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Visual Regression: FAILED" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.internationalization-testing.result }}" == "success" ]; then
          echo "✅ Internationalization: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Internationalization: FAILED" >> $GITHUB_STEP_SUMMARY
        fi

        # Overall status
        if [[ "${{ needs.test-coverage.result }}" == "success" &&
              "${{ needs.accessibility-testing.result }}" == "success" &&
              "${{ needs.performance-testing.result }}" == "success" &&
              "${{ needs.integration-testing.result }}" == "success" &&
              "${{ needs.security-scanning.result }}" == "success" &&
              "${{ needs.code-quality.result }}" == "success" &&
              "${{ needs.visual-regression.result }}" == "success" &&
              "${{ needs.internationalization-testing.result }}" == "success" ]]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 ALL QUALITY GATES PASSED" >> $GITHUB_STEP_SUMMARY
          exit 0
        else
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "❌ SOME QUALITY GATES FAILED" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi