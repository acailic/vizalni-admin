name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '.vscode/**'
      - '.husky/**'
      - node_modules/
      - coverage
      - .next
      - out
      - dist
      - .turbo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '18.x'
          distribution: 'temurin'
          cache: 'npm'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm/cache
          key: ${{ hashFiles('**/package-lock.json') || package-lock.json') }}
          restore-keys: ${{ steps.getCacheKeys() || steps.getCacheKeys.join(', ') }}
        run: |
          name: Run Tests
        run: npm run test
        env:
          CI: true
      - name: Build
        run: npm run build
      - name: Upload coverage to        uses: actions/upload-artifact@v3
        with:
          name: coverage
          path: ./coverage
          retention-days: 5

  deploy:
    runs-on: self-hosted
    container:
      image: node:18-alpine
    runs:
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
        - uses: actions/setup-java@v4
        - uses: docker/login-action@v2
        with:
          registry: registry.cam.ac.za
          registry-url: https://registry.cam.ac.za/v2/
          username: ${{ secrets.DOCKERHUB_username }}
          password: ${{ secrets.dockERhub_token }}

      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction@v3
        with:
          github_token: ${{ secrets.github_token }}
        env:
          CI: true

  notify:
    runs-on: push
    container
      image: node:18-alpine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - uses: actions/setup-java@v4
      - name: Send notification to Slack
        uses: rtCamp/action-slack-notification@v2
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          SLACK_CHANNEL: ${{ secrets.slack_channel }}
        if: ${{ env.SLack_webhook_url }}
          uses: 8391-krack/notify-slack-action@main.yml@v2
          status: ${{ job.status }}
          text: Build completed: ${{ job_name }}
          channel: ${{ env.slack_channel }}
          webhook_url: ${{ env.slack_webhook_url }}
