name: Performance Monitoring

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run performance checks daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  bundle-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build application with bundle analysis
        run: |
          yarn build
          ANALYZE=true yarn build
        env:
          ANALYZE: true
          NODE_ENV: production

      - name: Generate bundle report
        run: |
          npx webpack-bundle-analyzer .next/static/chunks/*.js --mode json --report bundle-report.json
          node scripts/bundle-size-check.js

      - name: Check bundle size budgets
        run: |
          node scripts/performance-budget-check.js
        env:
          BUNDLE_SIZE_LIMIT: 5000000  # 5MB
          CHUNK_SIZE_LIMIT: 250000   # 250KB

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.12.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Performance regression check
        run: |
          node scripts/performance-regression-check.js
        env:
          PERFORMANCE_BASELINE_URL: https://vizualni-admin.vercel.app

      - name: Upload bundle analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: |
            bundle-report.json
            .next/static/chunks/
          retention-days: 30

      - name: Comment PR with performance results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read bundle analysis results
            let bundleResults = 'No bundle analysis available';
            if (fs.existsSync('bundle-report.json')) {
              const bundleData = JSON.parse(fs.readFileSync('bundle-report.json', 'utf8'));
              const totalSize = Object.values(bundleData)
                .reduce((sum: number, chunk: any) => sum + chunk.parsedSize, 0);

              bundleResults = `## Bundle Analysis Results\n\n`;
              bundleResults += `- **Total Bundle Size**: ${(totalSize / 1024 / 1024).toFixed(2)}MB\n`;
              bundleResults += `- **Chunks**: ${Object.keys(bundleData).length}\n`;

              const largestChunks = Object.entries(bundleData)
                .sort(([,a]: any, [,b]: any) => b.parsedSize - a.parsedSize)
                .slice(0, 5);

              bundleResults += `\n### Largest Chunks:\n`;
              largestChunks.forEach(([name, data]: [string, any]) => {
                bundleResults += `- ${name}: ${(data.parsedSize / 1024).toFixed(2)}KB\n`;
              });
            }

            // Read Lighthouse results
            let lighthouseResults = 'No Lighthouse results available';
            if (fs.existsSync('.lighthouseci/')) {
              const lhrFiles = fs.readdirSync('.lighthouseci/')
                .filter(file => file.endsWith('.json'));

              if (lhrFiles.length > 0) {
                const lhrData = JSON.parse(
                  fs.readFileSync(`.lighthouseci/${lhrFiles[0]}`, 'utf8')
                );

                lighthouseResults = `## Lighthouse Performance Results\n\n`;
                lighthouseResults += `- **Performance**: ${lhrData.categories.performance.score * 100}/100\n`;
                lighthouseResults += `- **First Contentful Paint**: ${lhrData.audits['first-contentful-paint'].numericValue}ms\n`;
                lighthouseResults += `- **Largest Contentful Paint**: ${lhrData.audits['largest-contentful-paint'].numericValue}ms\n`;
                lighthouseResults += `- **Cumulative Layout Shift**: ${lhrData.audits['cumulative-layout-shift'].numericValue}\n`;
                lighthouseResults += `- **Total Blocking Time**: ${lhrData.audits['total-blocking-time'].numericValue}ms\n`;
              }
            }

            const comment = `# 🔍 Performance Analysis Results\n\n${bundleResults}\n\n${lighthouseResults}\n\n---\n*This comment was generated by the performance monitoring workflow.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  performance-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run performance benchmarks
        run: |
          yarn test:performance
        env:
          NODE_ENV: production

      - name: Run memory leak tests
        run: |
          node tests/memory-leak-test.js

      - name: Generate performance report
        run: |
          node scripts/generate-performance-report.js > performance-report.md

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: performance-report.md

  dependency-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Analyze bundle dependencies
        run: |
          npx depcheck
          npx webpack-bundle-analyzer --mode static --no-open --report bundle-report.html

      - name: Check for unused dependencies
        run: |
          node scripts/check-unused-dependencies.js

      - name: Suggest lighter alternatives
        run: |
          node scripts/dependency-optimization-suggestions.js

      - name: Upload dependency analysis
        uses: actions/upload-artifact@v4
        with:
          name: dependency-analysis
          path: |
            bundle-report.html
            dependency-suggestions.md

  size-limit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run size limit checks
        run: |
          yarn build
          npx size-limit
        env:
          SIZE_LIMIT_KB: 250

      - name: Compare with previous version
        if: github.event_name == 'pull_request'
        run: |
          node scripts/compare-bundle-size.js

  alerts:
    runs-on: ubuntu-latest
    needs: [bundle-analysis, performance-tests, size-limit]
    if: failure()

    steps:
      - name: Create performance alert
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Performance Regression Detected';
            const body = `
            Performance issues were detected in the latest build:

            - Bundle size exceeds limits
            - Performance benchmarks failed
            - Size limit checks failed

            Please review the workflow logs and address the performance issues before merging.

            Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            `;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['performance', 'bug', 'regression']
            });

      - name: Notify team
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#performance-alerts'
          text: |
            Performance check ${{ job.status }} for ${{ github.repository }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}