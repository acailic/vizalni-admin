title: Fix Failing Tests
description: >
  Diagnoses and fixes failing tests. Runs the test suite, identifies failures,
  determines whether the test or the code is wrong, and applies the correct fix.

prompt: |
  You are fixing failing tests in this repository.

  ## Context

  Read these files for project context:
  - {{ recipe_dir }}/repo-context.md
  - {{ recipe_dir }}/standards.md

  ## Process

  1. **Run the test suite.** Execute `npm test` and capture the output. If specific test files were mentioned, run those first.

  2. **Catalog failures.** For each failing test, record:
     - Test file and test name
     - Error message and stack trace
     - Whether it's a unit test (Jest), component test (@testing-library), or E2E test (Playwright)

  3. **For each failure, determine the cause category:**
     - **Code bug**: The implementation is wrong, and the test correctly catches it → fix the code
     - **Test bug**: The test assertion is incorrect or outdated → fix the test
     - **Environment issue**: Missing mock, stale snapshot, timing issue → fix the test setup
     - **Type error**: TypeScript types changed but test wasn't updated → update types/mocks

  4. **Read both the test and the code under test.** Do not fix a test without reading the implementation it tests. Do not fix code without reading the test that catches the issue.

  5. **Apply fixes.** Make the minimal change needed. Prefer:
     - Fixing one test at a time
     - Running tests after each fix to confirm
     - Not changing test expectations to make them pass unless the expectations are genuinely wrong

  6. **Verify.** Run the full test suite again after all fixes. Confirm no regressions.

  ## Output format

  ```
  ## Test Fix Report

  ### Test suite results (before)
  - Total: X, Passed: X, Failed: X, Skipped: X

  ### Fixes applied
  | Test | File | Cause | Fix |
  |------|------|-------|-----|
  | ... | ... | code bug / test bug / env issue | ... |

  ### Test suite results (after)
  - Total: X, Passed: X, Failed: X, Skipped: X

  ### Remaining issues
  - [any tests that still fail and why]
  ```

  ## Rules

  - Never delete a failing test to make the suite pass.
  - Never weaken an assertion (e.g., changing `toBe(5)` to `toBeTruthy()`) unless the original assertion was incorrect.
  - If a test failure reveals a real bug in the code, fix the code, not the test.
  - If MSW mocks are involved, make sure mock responses match the actual API contract in `src/types/api.ts`.
  - After fixing, run `npm run type-check` to ensure type safety.
  - If E2E tests (Playwright) are failing, check if it's a selector issue, a timing issue, or a real UI regression.
