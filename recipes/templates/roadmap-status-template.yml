# Goose Auto-Implement Roadmap Status
#
# This is the single source of truth for autonomous feature implementation.
# Copy this file to recipes/roadmap-status.yml and fill in your features.
#
# Status values: not-started | in-progress | completed | blocked
# The dispatcher reads this file to pick the next feature.
# Features are processed in list order (top to bottom).

schedule:
  interval_hours: 4    # Should match the cron in goose-feature-auto.yml
  enabled: true        # Set to false to pause all autonomous work

features:
  # Example feature entry — copy and modify for each feature:
  #
  # - id: feature-01
  #   name: User Authentication
  #   spec: recipes/inputs/feature-01-user-auth.md
  #   status: not-started
  #   branch: null
  #   pr: null
  #   blocked_reason: null
  #   blocked_issue: null
  #   started_at: null
  #   completed_at: null

  - id: feature-01
    name: REPLACE_WITH_FEATURE_NAME
    spec: recipes/inputs/REPLACE_WITH_SPEC_FILE.md
    status: not-started
    branch: null
    pr: null
    blocked_reason: null
    blocked_issue: null
    started_at: null
    completed_at: null
