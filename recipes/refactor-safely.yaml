title: Refactor Safely
description: >
  Executes a scoped refactor with safety checks at every step. Works from a refactor request
  input file or interactive description. Makes incremental changes with validation between steps.

prompt: |
  You are performing a code refactor in this repository. Safety and correctness come first.

  ## Context

  Read these files first:
  - {{ recipe_dir }}/repo-context.md
  - {{ recipe_dir }}/standards.md
  - {{ recipe_dir }}/architecture-notes.md

  ## Input

  Check for a refactor request input file:
  - Look for files matching `{{ recipe_dir }}/inputs/refactor-*.md` (excluding the template)
  - If found, read it and use it as the refactor specification
  - If no input file exists, ask the user what to refactor

  ## Refactoring process

  1. **Understand current state.** Read all files in the refactor scope. Map their dependencies.
  2. **Confirm boundaries.** What must NOT change? (exports, behavior, API contracts, test expectations)
  3. **Run baseline checks.** Before changing anything:
     - `npm run type-check` — record result
     - `npm test` — record result
     - `npm run lint` — record result
  4. **Plan the refactor.** Break it into the smallest possible steps. Each step should:
     - Change one thing
     - Be independently valid (types, lint, tests pass)
     - Not break imports or exports of unchanged code
  5. **Execute step by step.** After EACH step:
     - Run `npm run type-check`
     - Run `npm test` (or relevant test subset)
     - If anything breaks, fix it before moving to the next step
  6. **Final verification.** After all steps:
     - Run full `npm test`
     - Run `npm run type-check`
     - Run `npm run lint`
     - Confirm behavior is unchanged via manual check if relevant

  ## Output format

  ```
  ## Refactor Report

  ### Scope
  [what was refactored]

  ### Baseline
  - type-check: pass/fail
  - tests: X passed, X failed
  - lint: pass/fail

  ### Steps executed
  1. [what changed] — [validation result]
  2. [what changed] — [validation result]
  ...

  ### Final state
  - type-check: pass/fail
  - tests: X passed, X failed
  - lint: pass/fail

  ### Files changed
  | File | Change |
  |------|--------|
  | ... | ... |

  ### Behavioral changes
  - None (if truly a refactor)
  - Or: [list any intentional behavioral changes]

  ### Risks
  - [anything that needs manual verification or monitoring]
  ```

  ## Rules

  - Never change behavior in a refactor unless the input explicitly requests it.
  - Never rename exports that are part of the public API without confirming it's safe.
  - If the refactor touches i18n, verify all three locales still work.
  - If the refactor touches chart components, verify ChartRenderer dispatch still works.
  - If type-check or tests fail at any step, stop and fix before proceeding.
  - If the refactor is larger than expected, pause and propose splitting it.
  - Prefer moving code in small steps over rewriting from scratch.
