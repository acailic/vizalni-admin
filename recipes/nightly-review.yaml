title: Nightly Repository Review
description: >
  Scheduled nightly review of repository health. Checks build, tests, types, recent commits,
  and code quality signals. Designed for unattended execution with structured output.

prompt: |
  You are running an automated nightly review of this repository. Produce a structured health report.

  ## Context

  Read:
  - {{ recipe_dir }}/repo-context.md
  - {{ recipe_dir }}/standards.md

  ## Checks to perform

  Execute each section in order. Record every result. Do not stop on failures — complete all checks.

  ### 1. Build health
  ```bash
  npm run build
  ```
  Record: pass/fail, any errors, build duration if visible.

  ### 2. Type safety
  ```bash
  npm run type-check
  ```
  Record: pass/fail, number and location of errors.

  ### 3. Lint status
  ```bash
  npm run lint
  ```
  Record: pass/fail, number of warnings and errors.

  ### 4. Test suite
  ```bash
  npm test
  ```
  Record: total, passed, failed, skipped.

  ### 5. Recent activity
  ```bash
  git log --oneline --since="24 hours ago"
  ```
  Record: number of commits, brief summary of changes.

  ### 6. Uncommitted state
  ```bash
  git status --short
  ```
  Record: any uncommitted changes, untracked files.

  ### 7. Dependency freshness
  ```bash
  npm outdated 2>/dev/null || true
  ```
  Record: number of outdated packages, any with major version bumps available.

  ### 8. Security audit
  ```bash
  npm audit --production 2>/dev/null || true
  ```
  Record: vulnerabilities by severity.

  ### 9. Quick code scan
  Run these searches and report findings:
  - `grep -rn "// TODO" src/ --include="*.ts" --include="*.tsx" | wc -l` — count of TODOs
  - `grep -rn "// FIXME" src/ --include="*.ts" --include="*.tsx" | wc -l` — count of FIXMEs
  - `grep -rn "// HACK" src/ --include="*.ts" --include="*.tsx" | wc -l` — count of HACKs
  - `grep -rn "@ts-ignore\|@ts-expect-error" src/ --include="*.ts" --include="*.tsx" | wc -l` — count of type suppressions
  - `grep -rn "as any" src/ --include="*.ts" --include="*.tsx" | wc -l` — count of `as any` casts

  ## Output format

  ```
  # Nightly Review — [DATE]

  ## Health Summary
  | Check | Status | Detail |
  |-------|--------|--------|
  | Build | pass/fail | |
  | Types | pass/fail | X errors |
  | Lint | pass/fail | X warnings, Y errors |
  | Tests | pass/fail | X/Y passed |
  | Security | clean/X vulns | |
  | Deps | current/X outdated | |

  ## Recent Activity (last 24h)
  - X commits
  - [brief summary of what changed]

  ## Code Quality Signals
  | Marker | Count | Trend |
  |--------|-------|-------|
  | TODO | X | |
  | FIXME | X | |
  | HACK | X | |
  | @ts-ignore/expect-error | X | |
  | as any | X | |

  ## Issues Requiring Attention
  - [anything that's broken, degraded, or trending badly]

  ## Recommended Actions
  - [specific, actionable items ranked by priority]
  ```

  ## Rules

  - This runs unattended. Do not ask questions. Use defaults for any ambiguity.
  - Complete all checks even if some fail.
  - Do not modify any files. This is a read-only health check.
  - Keep output concise. No filler, no commentary — just findings and recommendations.
  - If a command hangs or times out, note it and move on.
