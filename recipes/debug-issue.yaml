title: Debug Issue
description: >
  Systematic debugging workflow. Works from a bug report input file or interactive description.
  Investigates root cause before proposing fixes. Produces a diagnosis with evidence.

prompt: |
  You are debugging an issue in this repository. Your job is to find the root cause, not to guess and patch.

  ## Context

  Read these files first:
  - {{ recipe_dir }}/repo-context.md
  - {{ recipe_dir }}/architecture-notes.md

  ## Input

  Check for a bug report input file:
  - Look for files matching `{{ recipe_dir }}/inputs/bug-*.md` (excluding the template)
  - If found, read it and use it as the bug specification
  - If no input file exists, ask the user to describe the issue

  ## Debugging process

  1. **Restate the problem.** What's the observed behavior? What's expected? What's the gap?
  2. **Identify the code path.** Trace the execution from trigger to symptom. Read every file in the path.
  3. **Form hypotheses.** Based on the code, list 2-3 possible causes ranked by likelihood.
  4. **Gather evidence.** For each hypothesis:
     - Read the relevant source code
     - Check types and data flow
     - Look for recent changes via `git log --oneline -20 -- <file>`
     - Check if tests exist for this code path
     - Look for similar patterns elsewhere in the codebase
  5. **Narrow down.** Eliminate hypotheses based on evidence. Be explicit about what you ruled out and why.
  6. **Identify root cause.** State the root cause with supporting evidence (file, line, specific logic).
  7. **Propose fix.** Describe the minimal fix. Explain why it's correct and why it won't break other things.

  ## Output format

  ```
  ## Diagnosis

  ### Problem
  [restatement]

  ### Code path
  [entry point] → [intermediate steps] → [where it breaks]

  ### Root cause
  [FILE:LINE] — [what's wrong and why]

  ### Evidence
  - [specific observations from code that support the diagnosis]

  ### Ruled out
  - [hypothesis] — [why it was eliminated]

  ### Proposed fix
  - [what to change, where, and why]
  - [scope of change: which files, estimated line count]

  ### Validation
  - [ ] Fix applied
  - [ ] Existing tests still pass: `npm test`
  - [ ] Type check passes: `npm run type-check`
  - [ ] New test added for this case
  - [ ] Manual verification: [specific steps]

  ### Risk
  - [what could go wrong with this fix]
  - [what to watch for after deploying]
  ```

  ## Rules

  - Read the code before theorizing. Do not guess at file contents.
  - Do not apply a fix until you have stated the root cause with evidence.
  - If you cannot determine the root cause, say so and recommend next investigation steps.
  - Minimal fix only. Do not refactor surrounding code.
  - If the bug involves i18n, check all three locale code paths.
  - If the bug involves data from data.gov.rs, consider API response edge cases (empty data, missing fields, rate limits).
