title: Architecture Drift Review
description: >
  Scheduled weekly check for architectural boundary violations, pattern drift,
  and structural decay. Compares actual code against intended architecture.

prompt: |
  You are reviewing this codebase for architectural drift — places where the code has diverged from the intended architecture.

  ## Context

  Read carefully:
  - {{ recipe_dir }}/repo-context.md
  - {{ recipe_dir }}/architecture-notes.md

  The architecture notes describe the intended boundaries. Your job is to find violations.

  ## Checks

  ### 1. Layer boundary violations

  Read files in each layer and check:

  **`src/app/` (pages/routes)** should NOT:
  - Contain business logic or data transformation
  - Import from `src/services/` directly (should go through `src/lib/api/`)
  - Contain inline styles or tailwind classes beyond layout concerns

  **`src/components/`** should NOT:
  - Import `axios`, `fetch`, or the datagov client directly
  - Import from `src/app/` (components should not depend on routes)
  - Contain API URLs or environment variable access

  **`src/lib/`** should NOT:
  - Import React components
  - Import from `src/components/` or `src/app/`

  **`src/services/`** should NOT:
  - Import React components
  - Import from `src/components/` or `src/app/`
  - Contain UI logic

  **`src/types/`** should NOT:
  - Import anything from `src/` (types should be leaf nodes with no runtime imports)

  ### 2. Visualization pattern compliance

  Per architecture notes, all chart rendering should go through `ChartRenderer`. Check:
  - Are there components that render charts (Recharts, Chart.js, Plotly, D3) without going through ChartRenderer?
  - Are there direct D3 DOM manipulations outside of properly isolated ref-based patterns?
  - Were any new chart libraries added beyond the approved four?

  ### 3. Data fetching pattern compliance

  Check:
  - Are client components using SWR or React Query (correct) vs raw fetch/axios (incorrect)?
  - Are server components using the datagov-client with cache() (correct) vs direct fetch (incorrect)?
  - Are there API calls in `src/components/` that bypass the service layer?

  ### 4. i18n compliance

  Check:
  - Are there hardcoded user-facing strings in JSX (not using translation functions)?
  - Search: `grep -rn '>[A-Z][a-z]' src/components/ src/app/ --include="*.tsx"` for potential hardcoded text
  - Are translation key namespaces consistent across all three locale files?

  ### 5. Import pattern health

  Check:
  - Are path aliases (`@/...`) used consistently? Look for `../../../` patterns.
  - Are there circular imports? Check for files that import from each other.
  - Are there barrel files (index.ts re-exports) that could cause bundle bloat?

  ### 6. State management compliance

  Check:
  - Is Zustand used only for cross-component client state (correct)?
  - Is there state management logic inside components that should be in a store?
  - Are there prop-drilling chains deeper than 3 levels that suggest a missing store or context?

  ## Output format

  ```
  # Architecture Drift Review — [DATE]

  ## Overall health: [CLEAN / MINOR DRIFT / SIGNIFICANT DRIFT]

  ## Boundary violations
  | Source file | Violation | Severity |
  |-------------|-----------|----------|
  | ... | imports X from wrong layer | high/medium/low |

  ## Pattern violations
  | Area | Finding | Location |
  |------|---------|----------|
  | charts | direct Plotly use without ChartRenderer | src/components/... |
  | data fetching | raw axios in component | src/components/... |
  | i18n | hardcoded string | src/app/...:42 |

  ## Import health
  - Deepest relative import: [path]
  - Circular imports found: [list or "none"]
  - Missing alias usage: [count]

  ## Positive patterns observed
  - [things that follow the architecture well]

  ## Recommended fixes (prioritized)
  1. [highest impact fix with specific files]
  2. [next fix]
  3. [next fix]

  ## Drift trend
  [improving / stable / worsening — compared to prior report if available]
  ```

  Save the report to `recipes/outputs/arch-drift-[DATE].md` for trend tracking.

  ## Rules

  - Read actual source files. Do not infer from file names alone.
  - Every violation must cite a specific file and line.
  - Minor drift in a young codebase is normal. Focus on high-severity violations.
  - Do not modify any source code. Report only.
  - If the architecture notes are outdated (code has intentionally moved away), note this so the notes can be updated.
