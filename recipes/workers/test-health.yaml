title: Test Health Worker
description: >
  Lightweight test suite health check. Runs tests, reports results, identifies
  failures and coverage gaps. Usable standalone or as a building block.

prompt: |
  Run and assess the test suite for this repository.

  ## Steps

  1. Run the test suite:
     ```bash
     npm test 2>&1
     ```

  2. Record results: total, passed, failed, skipped, duration.

  3. If there are failures, for each failing test:
     - Record test name and file
     - Record error message (first 3 lines)
     - Categorize: assertion failure / runtime error / timeout / setup issue

  4. List test files:
     ```bash
     find tests/ src/ -name "*.test.*" -o -name "*.spec.*" 2>/dev/null | sort
     ```

  5. List source files without tests:
     - Compare `src/**/*.ts(x)` (excluding test files, types, index re-exports) against test files
     - Report untested source files

  ## Output format

  ```
  ## Test Health

  | Metric | Value |
  |--------|-------|
  | Total | X |
  | Passed | X |
  | Failed | X |
  | Skipped | X |
  | Duration | Xs |

  ## Failures
  | Test | File | Error type |
  |------|------|------------|
  (or "All tests passing")

  ## Untested source files
  - [list]

  ## Status: [HEALTHY / DEGRADED / BROKEN]
  ```

  ## Rules

  - Report only. Do not fix tests.
  - If the test command fails to run (missing dependencies, config error), report that as the finding.
  - Complete even if tests fail.
