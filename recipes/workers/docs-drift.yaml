title: Documentation Drift Check
description: >
  Checks whether documentation matches the current state of the code.
  Covers README, CHANGELOG, env docs, API docs, and inline references.

prompt: |
  Check if this repository's documentation is in sync with the code.

  ## Checks

  ### 1. README accuracy
  Read `README.md`. For each claim, verify against the code:
  - Are listed features actually implemented?
  - Are listed scripts present in `package.json`?
  - Are setup instructions still accurate?
  - Are tech stack references current?
  - Are listed dependencies still in `package.json`?

  ### 2. CHANGELOG completeness
  Read `CHANGELOG.md`. Compare against recent git history:
  ```bash
  git log --oneline -30
  ```
  - Are recent significant changes reflected in the changelog?
  - Are version numbers consistent with `package.json`?

  ### 3. Environment documentation
  Compare `.env.example` against actual usage:
  - Search `src/` for `process.env.` references
  - Are all referenced env vars documented in `.env.example`?
  - Are there documented env vars that are never referenced in code?

  ### 4. CONTRIBUTING.md accuracy
  Read `CONTRIBUTING.md`. Check:
  - Are development setup steps current?
  - Are listed commands still valid?
  - Are workflow descriptions still accurate?

  ### 5. Inline documentation drift
  Check `docs/` directory if it exists:
  - Are API docs referencing current endpoints and types?
  - Are architecture docs matching current file structure?

  ### 6. Translation file documentation
  - Are the i18n locales documented correctly in README or config?
  - Do translation files have consistent structure?

  ## Output format

  ```
  ## Documentation Drift — [DATE]

  ### Drift findings
  | Document | Section | Issue | Severity |
  |----------|---------|-------|----------|
  | README.md | Features | lists X but not implemented | high |
  | .env.example | - | missing NEXT_PUBLIC_X | medium |

  ### Undocumented code
  - [env vars used but not in .env.example]
  - [features implemented but not in README]

  ### Dead documentation
  - [documented features/vars that no longer exist in code]

  ### Status: [IN SYNC / MINOR DRIFT / SIGNIFICANT DRIFT]

  ### Recommended fixes
  1. [specific fix with file and section]
  ```

  ## Rules

  - Report only. Do not modify documentation.
  - Focus on factual inaccuracies, not writing quality.
  - Missing documentation for new features is high severity.
  - Dead documentation (references to removed features) is medium severity.
  - Minor wording differences are not drift.
